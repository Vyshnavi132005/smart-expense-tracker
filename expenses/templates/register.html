{% extends 'base.html' %} 
 
{% block content %} 
<div class='row justify-content-center'> 
<div class='col-md-7 col-lg-5'> 
<div class='card brand-card p-4 p-lg-5'> 
<p class='text-uppercase small text-muted'>Create Account</p> 
<h1 class='h2 fw-bold mb-4'>Register</h1> 
<form method='post'> 
{% csrf_token %} 
<div class='mb-3'><label class='form-label'>Username</label>{{ form.username }}</div> 
<div class='mb-3'><label class='form-label'>Email</label>{{ form.email }}</div> 
<div class='mb-3'><label class='form-label'>Password</label>{{ form.password1 }}</div> 
<div class='mb-3'><label class='form-label'>Confirm Password</label>{{ form.password2 }}</div> 
<button type='submit' class='btn btn-brand w-100'>Register</button> 
</form> 
<p class='text-center mt-4 mb-0'>Already have an account? <a href='{% url 'login' %}'>Login here</a></p> 
</div> 
</div> 
</div> 
{% endblock %} 
 
{% block extra_js %} 
<script>document.querySelectorAll('input').forEach(function(element) { element.classList.add('form-control'); });</script> 
{% endblock %}
