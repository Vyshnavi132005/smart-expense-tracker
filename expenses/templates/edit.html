{% extends 'base.html' %} 
 
{% block content %} 
<div class='row justify-content-center'> 
<div class='col-lg-7'> 
<div class='card brand-card p-4 p-lg-5'> 
<div class='d-flex justify-content-between align-items-center mb-4'> 
<div><p class='text-uppercase small text-muted mb-1'>Update Expense</p><h1 class='h2 fw-bold mb-0'>Edit Expense</h1></div> 
<a class='btn btn-outline-secondary' href='{% url 'home' %}'>Back to Dashboard</a> 
</div> 
<form method='post'> 
{% csrf_token %} 
<div class='mb-3'><label class='form-label'>Amount</label>{{ form.amount }}</div> 
<div class='mb-3'><label class='form-label'>Category</label>{{ form.category }}</div> 
<div class='mb-3'><label class='form-label'>Description</label>{{ form.description }}</div> 
<div class='mb-3'><label class='form-label'>Date</label>{{ form.date }}</div> 
<button type='submit' class='btn btn-brand'>Save Changes</button> 
</form> 
</div> 
</div> 
</div> 
{% endblock %} 
 
{% block extra_js %} 
<script>document.querySelectorAll('input').forEach(function(element) { element.classList.add('form-control'); });</script> 
{% endblock %}
