{% extends 'base.html' %} 
 
{% block content %} 
<div class='row justify-content-center'> 
<div class='col-md-6 col-lg-4'> 
<div class='card brand-card p-4 p-lg-5'> 
<p class='text-uppercase small text-muted'>Welcome Back</p> 
<h1 class='h2 fw-bold mb-4'>Login</h1> 
<form method='post'> 
{% csrf_token %} 
<div class='mb-3'><label class='form-label'>Username</label>{{ form.username }}</div> 
<div class='mb-3'><label class='form-label'>Password</label>{{ form.password }}</div> 
<button type='submit' class='btn btn-brand w-100'>Login</button> 
</form> 
<p class='text-center mt-4 mb-0'>Do not have an account? <a href='{% url 'register' %}'>Register here</a></p> 
</div> 
</div> 
</div> 
{% endblock %} 
 
{% block extra_js %} 
<script>document.querySelectorAll('input').forEach(function(element) { element.classList.add('form-control'); });</script> 
{% endblock %}
